---
include:
  - board: nice_nano//zmk
    shield: roard_dongle
    snippet: studio-rpc-usb-uart
  - board: nice_nano//zmk
    shield: roard_left nice_view_adapter nice_view_custom
    cmake-args: >
      -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
      -DCONFIG_ZMK_SPLIT_ESB=y
      -DCONFIG_ZMK_SPLIT_ESB_PERIPHERAL_ID=0
  - board: nice_nano//zmk
    shield: roard_right nice_view_adapter nice_view_custom
    cmake-args: >
      -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
      -DCONFIG_ZMK_SPLIT_ESB=y
      -DCONFIG_ZMK_SPLIT_ESB_PERIPHERAL_ID=1
  - board: nice_nano//zmk
    shield: settings_reset